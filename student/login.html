<!DOCTYPE html>
<html>
<head>
  <title>Student Login</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Student Login</h2>
  <form onsubmit="loginStudent(event)">
    <input type="text" id="studentUser" placeholder="Username" required>
    <input type="password" id="studentPass" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p><a href="#" onclick="alert('Password reset request sent to admin!')">Forgot Password?</a></p>

  <script>
    function loginStudent(e) {
      e.preventDefault();
      const user = document.getElementById('studentUser').value;
      const pass = document.getElementById('studentPass').value;
      // Simulated static login (can be extended to JSON validation)
      if (user === "student1" && pass === "student123") {
        localStorage.setItem("studentName", user);
        location.href = "dashboard.html";
      } else {
        alert("Invalid credentials");
      }
    }
  </script>
</body>
</html>
