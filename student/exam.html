<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <style>
    body { font-family: Arial; background: #f0f4f8; padding: 20px; }
    h2 { text-align: center; }
    .question-card {
      background: white; padding: 15px; margin: 10px 0;
      border-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    button {
      background: #3498db; color: white;
      padding: 10px 20px; margin-top: 20px;
      border: none; border-radius: 4px; cursor: pointer;
    }
    #downloadBtn { display: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h2 id="examTitle">Exam</h2>
  <div id="questionContainer"></div>
  <button onclick="submitExam()">Submit Exam</button>
  <div id="resultContainer"></div>
  <button id="downloadBtn">Download Report</button>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const subject = urlParams.get("subject");
    const exam = urlParams.get("exam");
    let questions = [];

    fetch(`../../data/${subject}/${exam}.json`)
      .then(res => res.json())
      .then(data => {
        questions = data;
        document.getElementById("examTitle").innerText = exam.replace(/_/g, " ");
        renderQuestions();
      });

    function renderQuestions() {
      const container = document.getElementById("questionContainer");
      questions.forEach((q, i) => {
        const div = document.createElement("div");
        div.className = "question-card";
        div.innerHTML = `<p>Q${i + 1}: ${q.question}</p>`;
        q.options.forEach(opt => {
          div.innerHTML += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label><br>`;
        });
        container.appendChild(div);
      });
    }

    function submitExam() {
      let correct = 0, answers = [];
      questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const answer = selected ? selected.value : null;
        if (answer === q.answer) correct++;
        answers.push({ question: q.question, yourAnswer: answer, correctAnswer: q.answer });
      });

      const total = questions.length;
      const status = correct >= total / 2 ? "Pass" : "Fail";
      document.getElementById("resultContainer").innerHTML = `
        <h3>Result: ${correct}/${total} - ${status}</h3>
      `;

      document.getElementById("downloadBtn").style.display = "inline-block";
      document.getElementById("downloadBtn").onclick = () => {
        let report = `Exam: ${exam.replace(/_/g, " ")}\\nScore: ${correct}/${total}\\nStatus: ${status}\\n\\n`;
        answers.forEach((a, i) => {
          report += \`Q${i + 1}: ${a.question}\\nYour Answer: \${a.yourAnswer || "Not Answered"}\\nCorrect Answer: \${a.correctAnswer}\\n\\n\`;
        });
        const blob = new Blob([report], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = \`\${exam}_report.txt\`;
        link.click();
      };
    }
  </script>
</body>
</html>
