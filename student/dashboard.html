<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Welcome, <span id="studentName"></span></h2>
  <p>Select a subject to view available exams:</p>
  <select id="subjectSelect" onchange="showExams(this.value)">
    <option value="">-- Select Subject --</option>
    <option value="python">Python</option>
  </select>

  <ul id="examList"></ul>

  <script>
    const name = localStorage.getItem('studentName') || 'Student';
    document.getElementById('studentName').innerText = name;

    function showExams(subject) {
      const examList = document.getElementById('examList');
      examList.innerHTML = "";

      const launchData = JSON.parse(localStorage.getItem("launch.json") || "{}");
      const exams = launchData[subject];

      if (!exams || exams.length === 0) {
        examList.innerHTML = "<li>No launched exams</li>";
        return;
      }

      exams.forEach(exam => {
        const examText = exam.replace(/_/g, ' ').toUpperCase();
        const li = document.createElement("li");
        li.innerHTML = `<a href="exam.html?subject=${subject}&exam=${exam}">${examText}</a>`;
        examList.appendChild(li);
      });
    }
  </script>
</body>
</html>
