<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Welcome, <span id="studentName"></span></h2>
  <p>Select subject to view launched exams:</p>
  <select id="subjectSelect" onchange="loadExams(this.value)">
    <option value="">-- Choose Subject --</option>
    <option value="python">Python</option>
    <option value="mysql">MySQL</option>
  </select>

  <ul id="examList"></ul>

  <script>
    // Get student name from localStorage
    const name = localStorage.getItem('studentName') || 'Student';
    document.getElementById('studentName').innerText = name;

    let launchData = {};

    // Load launch.json from server
    fetch("../data/launch.json")
      .then(res => res.json())
      .then(data => {
        launchData = data;
      });

    function loadExams(subject) {
      const list = document.getElementById("examList");
      list.innerHTML = "";

      if (!launchData[subject] || launchData[subject].length === 0) {
        list.innerHTML = "<li>No launched exams for this subject</li>";
        return;
      }

      // Show each launched exam as a link
      launchData[subject].forEach(exam => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="exam.html?subject=${subject}&exam=${exam}">
          ${exam.replace(/_/g, ' ').toUpperCase()} Exam</a>`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
