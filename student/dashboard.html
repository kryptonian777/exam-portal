<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Welcome, <span id="studentName"></span></h2>
  <p>Select subject to view launched exams:</p>
  <select id="subjectSelect" onchange="loadExams(this.value)">
    <option value="">-- Choose Subject --</option>
    <option value="python">Python</option>
  </select>

  <ul id="examList"></ul>

  <script>
    const name = localStorage.getItem('studentName') || 'Student';
    document.getElementById('studentName').innerText = name;

    let launchData = JSON.parse(localStorage.getItem("launch.json") || "{}");

    function loadExams(subject) {
      const list = document.getElementById("examList");
      list.innerHTML = "";

      const launchedExams = launchData[subject] || [];

      if (launchedExams.length === 0) {
        list.innerHTML = "<li>No launched exams</li>";
        return;
      }

      launchedExams.forEach(exam => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="exam.html?subject=${subject}&exam=${exam}">
          ${exam.replace(/_/g, ' ').toUpperCase()} Exam</a>`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
