<!DOCTYPE html>
<html>
<head>
  <title>Student Performance</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Student Performance Report</h2>
  <div id="performanceContainer"></div>

  <script>
    const results = JSON.parse(localStorage.getItem('studentResults') || '[]');
    const container = document.getElementById('performanceContainer');

    if (results.length === 0) {
      container.innerHTML = "<p>No exam data available.</p>";
    } else {
      let table = "<table border='1'><tr><th>Student</th><th>Exam</th><th>Score</th><th>Total</th><th>Result</th><th>Date</th></tr>";
      results.forEach(r => {
        table += `<tr>
          <td>${r.student}</td>
          <td>${r.exam}</td>
          <td>${r.score}</td>
          <td>${r.total}</td>
          <td>${r.result}</td>
          <td>${r.timestamp}</td>
        </tr>`;
      });
      table += "</table>";
      container.innerHTML = table;
    }
  </script>
</body>
</html>
