<!DOCTYPE html>
<html>
<head>
  <title>Exam Launch Manager</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Admin - Exam Launch Manager</h2>
  <p>All exams are scanned from the <code>data/</code> folder. Set duration (in minutes) and toggle launch status as needed.</p>

  <table border="1" id="examTable">
    <thead>
      <tr>
        <th>Subject</th>
        <th>Topic</th>
        <th>Duration (min)</th>
        <th>Set Duration</th>
        <th>Launch Status</th>
        <th>Toggle</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let launchData = JSON.parse(localStorage.getItem("launch.json") || "{}");

    // Define static file list manually (you can update this as per your files)
    const staticFiles = {
      python: ["basics_of_python", "loops"],
      mysql: ["ddl_basics"]
    };

    function buildTable() {
      const tbody = document.querySelector("#examTable tbody");
      tbody.innerHTML = "";

      for (const subject in staticFiles) {
        staticFiles[subject].forEach(topic => {
          const key = subject + "_" + topic;
          const isLaunched = (launchData[subject] || []).includes(topic);
          const durationKey = `duration_${key}`;
          const duration = localStorage.getItem(durationKey) || "30";

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${subject}</td>
            <td>${topic}</td>
            <td id="show_${key}">${duration}</td>
            <td>
              <input type="number" id="${durationKey}" value="${duration}" min="1" max="180">
              <button onclick="setDuration('${subject}', '${topic}')">Set</button>
            </td>
            <td id="status_${key}">${isLaunched ? "Launched" : "Not Launched"}</td>
            <td><button onclick="toggleLaunch('${subject}', '${topic}')">Toggle</button></td>
          `;
          tbody.appendChild(row);
        });
      }
    }

    function toggleLaunch(subject, topic) {
      launchData[subject] = launchData[subject] || [];
      const list = launchData[subject];
      if (list.includes(topic)) {
        launchData[subject] = list.filter(t => t !== topic);
      } else {
        launchData[subject].push(topic);
      }
      localStorage.setItem("launch.json", JSON.stringify(launchData));
      buildTable();
    }

    function setDuration(subject, topic) {
      const key = subject + "_" + topic;
      const durationKey = `duration_${key}`;
      const duration = document.getElementById(durationKey).value;
      localStorage.setItem(durationKey, duration);
      document.getElementById(`show_${key}`).innerText = duration;
    }

    buildTable();
  </script>
</body>
</html>
