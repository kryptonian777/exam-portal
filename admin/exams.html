<!DOCTYPE html>
<html>
<head>
  <title>Admin Exam Launch</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Admin - Python Exam Launch</h2>
  <p>Select the Python exams to launch. Each topic corresponds to a JSON file in /data/python/.</p>

  <label>Select Subject:
    <select id="subjectSelect" onchange="renderTopics()">
      <option value="">-- Select Subject --</option>
      <option value="python">Python</option>
    </select>
  </label>

  <div id="examOptions"></div>

  <script>
    let launchData = JSON.parse(localStorage.getItem("launch.json") || "{}");

    const examTopics = {
      python: [
        { name: "Basics of Python", file: "basics_of_python" },
        { name: "Syntax", file: "syntax" },
        { name: "Assignment Operators", file: "assignmentops" }
      ]
    };

    function renderTopics() {
      const subject = document.getElementById("subjectSelect").value;
      const container = document.getElementById("examOptions");
      container.innerHTML = "";

      if (!subject || !examTopics[subject]) return;

      launchData[subject] = launchData[subject] || [];

      const table = document.createElement("table");
      table.border = "1";
      table.innerHTML = `
        <thead>
          <tr>
            <th>Topic</th>
            <th>File</th>
            <th>Launch Status</th>
            <th>Toggle</th>
          </tr>
        </thead>
        <tbody id="examTableBody"></tbody>
      `;
      container.appendChild(table);

      const tbody = document.getElementById("examTableBody");

      examTopics[subject].forEach(topic => {
        const key = topic.file;
        const launched = launchData[subject].includes(key);

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${topic.name}</td>
          <td>${key}.json</td>
          <td id="status_${key}">${launched ? "Launched" : "Not Launched"}</td>
          <td><button onclick="toggleLaunch('${subject}', '${key}')">Toggle</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function toggleLaunch(subject, topicFile) {
      launchData[subject] = launchData[subject] || [];
      const list = launchData[subject];
      const index = list.indexOf(topicFile);
      if (index > -1) {
        list.splice(index, 1);
      } else {
        list.push(topicFile);
      }
      localStorage.setItem("launch.json", JSON.stringify(launchData));
      renderTopics();
    }
  </script>
</body>
</html>
