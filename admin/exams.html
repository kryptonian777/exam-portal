<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Exam: Basics of Python</h2>
  <div id="questionContainer"></div>
  <button onclick="submitExam()">Submit Exam</button>
  <div id="resultContainer"></div>

  <script>
    const questions = [
      {
        question: "What is the correct file extension for Python files?",
        options: [".py", ".pt", ".pyt", ".python"],
        answer: ".py"
      },
      {
        question: "What does the print() function do in Python?",
        options: ["Accepts user input", "Displays output", "Defines a variable", "None of the above"],
        answer: "Displays output"
      },
      {
        question: "What is Python?",
        options: ["A snake", "A dance", "A programming language", "A database"],
        answer: "A programming language"
      }
    ];

    const questionContainer = document.getElementById("questionContainer");

    questions.forEach((q, idx) => {
      const div = document.createElement("div");
      div.innerHTML = `<p><b>Q${idx + 1}:</b> ${q.question}</p>`;
      q.options.forEach(opt => {
        div.innerHTML += `
          <label>
            <input type="radio" name="q${idx}" value="${opt}"> ${opt}
          </label><br>`;
      });
      questionContainer.appendChild(div);
    });

    function submitExam() {
      let correct = 0;
      let incorrect = 0;
      let answers = [];

      questions.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        const yourAnswer = selected ? selected.value : null;
        if (yourAnswer === q.answer) correct++;
        else incorrect++;

        answers.push({
          question: q.question,
          yourAnswer,
          correctAnswer: q.answer
        });
      });

      const total = questions.length;
      const status = correct >= total * 0.5 ? "Pass" : "Fail";
      const student = localStorage.getItem("studentName") || "Anonymous";

      const resultData = {
        student,
        subject: "python",
        exam: "basics_of_python",
        correct,
        total,
        status,
        answers
      };

      const resultContainer = document.getElementById("resultContainer");
      resultContainer.innerHTML = `
        <h3>Result Summary</h3>
        <p>Student: ${student}</p>
        <p>Score: ${correct}/${total}</p>
        <p>Status: ${status}</p>
      `;

      const btn = document.createElement("button");
      btn.textContent = "Download Report";
      btn.onclick = () => downloadReport(resultData);
      resultContainer.appendChild(btn);
    }

    function downloadReport(resultData) {
      const { student, subject, exam, correct, total, status, answers } = resultData;

      let content = `Exam Report - ${student}\\n`;
      content += `Subject: ${subject}\\nExam: ${exam}\\n`;
      content += `Score: ${correct}/${total}\\nStatus: ${status}\\n\\n`;

      content += `Detailed Answers:\\n`;
      answers.forEach((q, i) => {
        content += `Q${i + 1}: ${q.question}\\n`;
        content += `Your Answer: ${q.yourAnswer || "Not Attempted"}\\n`;
        content += `Correct Answer: ${q.correctAnswer}\\n`;
        content += `Result: ${q.correctAnswer === q.yourAnswer ? "✅ Correct" : q.yourAnswer ? "❌ Incorrect" : "⚠️ Not Attempted"}\\n\\n`;
      });

      const blob = new Blob([content], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${student}_${exam}_report.txt`;
      link.click();
    }
  </script>
</body>
</html>
