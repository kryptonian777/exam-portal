<!DOCTYPE html>
<html>
<head>
  <title>Exam Management</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <h2>Admin - Examination Management Portal</h2>

  <label for="subjectSelect">Select Subject:</label>
  <select id="subjectSelect" onchange="loadExams()">
    <option value="">--Choose--</option>
    <option value="python">Python</option>
    <option value="mysql">MySQL</option>
    <option value="aws">AWS</option>
    <option value="powerbi">Power BI</option>
    <option value="statistics">Statistics</option>
    <option value="cybersecurity">Cyber Security</option>
    <option value="pgsql">PG-SQL</option>
    <option value="ccna">CCNA</option>
  </select>

  <div id="examList"></div>

  <script>
    const availableExams = {
      python: ["basics_of_python", "syntax", "assignment_ops"],
      mysql: [],
      aws: [],
      powerbi: [],
      statistics: [],
      cybersecurity: [],
      pgsql: [],
      ccna: []
    };

    function loadExams() {
      const subject = document.getElementById("subjectSelect").value;
      const examList = document.getElementById("examList");
      examList.innerHTML = "";

      if (subject && availableExams[subject]) {
        availableExams[subject].forEach(exam => {
          const examDiv = document.createElement("div");
          examDiv.innerHTML = `
            <h3>${exam.replace(/_/g, " ")}</h3>
            <label>Launch Exam:
              <input type="checkbox" onchange="toggleExamLaunch('${subject}', '${exam}', this.checked)">
            </label>
            <br>
            <label>Duration (minutes): 
              <input type="number" id="${subject}_${exam}_duration" value="60">
            </label>
            <hr>
          `;
          examList.appendChild(examDiv);
        });
      }
    }

    function toggleExamLaunch(subject, exam, launched) {
      const duration = document.getElementById(`${subject}_${exam}_duration`).value;
      const examStatus = {
        subject,
        exam,
        launched,
        duration
      };
      console.log("Exam Updated:", examStatus);
      // You can add GitHub API call or localStorage sync here
    }
  </script>
</body>
</html>
